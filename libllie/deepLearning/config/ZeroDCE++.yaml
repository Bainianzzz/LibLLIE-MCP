model:
  name: ZeroDCEPlusPlus
  params:
#    input_channels: 3
#    number_f: 32
#    num_iterations: 8
data:
  dataset: LOLv1Dataset
  root_dir: path/to/your/dataset/dir
  train_split: train
  val_split: _test
  batch_size: 4
  num_workers: 4
  pin_memory: true
  return_filename: true
loss:
  name: zerodce++
  params: {}
  output_index: null
  output_key: null
optimizer:
  name: adam
  lr: 0.0001
  params:
    betas:
    - 0.9
    - 0.999
    weight_decay: 0.0
scheduler:
  name: cosineannealinglr
  params:
    T_max: 100
    eta_min: 1.0e-06
train:
  epochs: 100
  device: cuda
  output_dir: None
  save_every: 1
  validate_every: 1
  log_every: 10
  grad_clip: 1.0
  amp: false
  seed: 42
  resume: null

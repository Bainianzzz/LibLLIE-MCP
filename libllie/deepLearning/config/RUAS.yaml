model:
  name: RUAS
  params:
#    input_channels: 3
#    iem_nums: 3
#    nrm_nums: 3
#    enhance_channel: 3
#    denoise_channel: 6
#    pretrained_denoise_path: null
data:
  dataset: LOLv1Dataset
  root_dir: path/to/your/dataset/dir
  train_split: train
  val_split: _test
  batch_size: 2
  num_workers: 4
  pin_memory: true
  return_filename: true
loss:
  name: ruas_loss
  params:
#    enhance_fidelity_weight: 0.5
#    denoise_fidelity_weight: 1.0e-07
#    denoise_weight: 1.0
#    tv_weight: 1.0
#    sigma: 0.1
  output_index: null
  output_key: null
optimizer:
  name: adam
  lr: 0.0001
  params:
    betas:
    - 0.9
    - 0.999
    weight_decay: 0.0
scheduler:
  name: cosineannealinglr
  params:
    T_max: 100
    eta_min: 1.0e-06
train:
  epochs: 100
  device: cuda
  output_dir: None
  save_every: 1
  validate_every: 1
  log_every: 10
  grad_clip: 1.0
  amp: false
  seed: 42
  resume: null
